<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xatulis Banaki</title>
    <style>
        @font-face {
            font-family: 'DropboxCustomFont';
            src: url('font.ttf') format('truetype');
        }

        body {
            background-color: #f4f7f6;
            font-family: 'DropboxCustomFont', sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            display: flex;
            gap: 40px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        .left-col { flex: 1; }
        
        .right-col { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            margin-top: 50px; 
        }

        /* Updated logo styles */
        .logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .image-container {
            width: 100%;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .image-container video { width: 100%; height: 100%; object-fit: cover; }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }

        .btn-link:hover { transform: translateY(-2px); }

        .fb-btn { background-color: #1877f2; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }
        .wa-btn { background-color: #25d366; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        .gmail-btn { background-color: #ea4335; box-shadow: 0 4px 12px rgba(234, 67, 53, 0.3); }
        .register-btn { background-color: #a855f7; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); }
        .info-btn { background-color: #0ea5e9; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }

        .btn-icon { width: 18px; height: 18px; margin-right: 10px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="left-col">
            <!-- Logo image set to logo.png -->
            <img src="/logo.png" alt="Logo" class="logo">
            
            <div class="image-container">
                <video src="https://khatulisbanaki.onrender.com/video01.mp4" playsinline controls>
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>

        <div class="right-col">
            <a class="btn-link fb-btn" href="https://www.facebook.com/people/Khatulis-Banaki/61576935070047/">
                <img class="btn-icon" src="https://facebook.com/favicon.ico" alt="Facebook">
                ფეისბუქი - Facebook
            </a>
            <a class="btn-link wa-btn" href="kh.num.html">
                <img class="btn-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/WhatsApp_icon.png" alt="WhatsApp">
                ნომერი - Number
            </a>
            <a class="btn-link gmail-btn" href="https://mail.google.com/mail/?fs=1&to=khatuliscamp@gmail.com&tf=cm">
                <img class="btn-icon" src="https://images.icon-icons.com/2642/PNG/512/google_mail_gmail_logo_icon_159346.png" alt="Mail">
                მეილი - Mail
            </a>
            <a class="btn-link register-btn" href="https://docs.google.com/forms/d/1Wwr5ghQsjXYm8afDT0dm-6Ew6RUaKsRIzyteQxNg3-c/">
                რეგისტრაცია - Register
            </a>
            <a class="btn-link info-btn" href="kh.info.selection.html">
                ინფორმაცია - Information
            </a>
        </div>
    </div>

</body>
</html>
